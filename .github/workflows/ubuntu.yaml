name: Build (ubuntu)

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Enter a tagged OGC kernel version in the format <kernel-version>-ogc<rev>'
                required: true
    push:
        tags:
            - 'v*'

env:
    OCI_REPO: ghcr.io/${{ github.repository }}/ubuntu

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-deb:
        runs-on: ubuntu-latest

        container:
            image: ubuntu:latest
            volumes:
                - /usr:/usr-host
                - /opt:/opt-host
            options: --privileged

        steps:
            - name: Prepare environment
              run: |
                # Lowercase the image uri
                echo "OCI_REPO=${OCI_REPO,,}" >> ${GITHUB_ENV}

            - name: Maximize build space
              run: |
                  df -h
                  rm -rf /usr-host/share/dotnet
                  rm -rf /usr-host/share/swift
                  rm -rf /usr-host/share/java
                  rm -rf /usr-host/local/lib/android
                  rm -rf /opt-host/ghc
                  rm -rf /opt-host/hostedtoolcache
                  rm -rf /opt-host/az
                  df -h

            - name: Checkout sources
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Dependencies
              run: |
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update -y
                  apt-get install -y build-essential devscripts debhelper dh-python asciidoc-base bc bison cpio dwarves flex jq kmod libdw-dev libiberty-dev libnuma-dev  libslang2-dev lz4 rsync wget xmlto git
                  apt-get install -y libunwind-dev libpfm4-dev coccinelle openjdk-17-jdk libcapstone-dev libbabeltrace-dev systemtap-sdt-dev libzstd-dev dwarves zstd libbfd-dev libperl-dev libssl-dev

            - name: Get sources
              run: |
                  wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.19.6.tar.xz
                  wget https://github.com/OpenGamingCollective/linux/releases/download/v6.19.6-ogc1/monolithic.patch
                  tar -xf linux-6.19.6.tar.xz
                  cd linux-6.19.6
                  cp ../config .config
                  patch -Np1 < "../monolithic.patch"

            - name: Build
              run: |
                  cd linux-6.19.6
                  make olddefconfig
                  fakeroot make -j$(nproc) bindeb-pkg

            - name: Get OGC version
              if: startsWith(github.ref, 'refs/tags/')
              id: version
              run: |
                  TAG="${{ github.ref_name }}"
                  echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

            - name: Setup ORAS
              if: startsWith(github.ref, 'refs/tags/')
              uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

            - name: Setup Cosign
              if: startsWith(github.ref, 'refs/tags/')
              uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

            - name: Login to ghcr.io
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Push OCI artifact
              if: startsWith(github.ref, 'refs/tags/')
              id: push
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cd $GITHUB_WORKSPACE
                  DIGEST=$(oras push --format json "${REPO}:${VERSION}" ./*.deb | jq -r '.digest')
                  if [ -z "$DIGEST" ]; then
                      echo "::error::Failed to capture digest from oras push"
                      exit 1
                  fi
                  oras tag "${REPO}:${VERSION}" latest
                  echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              if: startsWith(github.ref, 'refs/tags/')
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
              with:
                  subject-name: ${{ env.OCI_REPO }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true

            - name: Sign artifacts
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign sign --yes "${REPO}:${VERSION}"
                  cosign sign --yes "${REPO}:latest"

            - name: Verify signature
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign verify \
                    --certificate-identity-regexp=".*" \
                    --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
                    "${REPO}:${VERSION}"
