name: Build (Nobara)

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Enter a tagged OGC kernel version in the format <kernel-version>-ogc<rev>'
                required: true
    push:
        tags:
            - 'v*'

env:
    OCI_REPO: ghcr.io/${{ github.repository }}/nobara

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-rpm:
        runs-on: ubuntu-latest

        container:
            image: fedora:latest
            volumes:
                - /usr:/usr-host
                - /opt:/opt-host
            options: --privileged

        steps:
            - name: Prepare environment
              run: |
                # Lowercase the image uri
                echo "OCI_REPO=${OCI_REPO,,}" >> ${GITHUB_ENV}

            - name: Maximize build space
              run: |
                  df -h
                  rm -rf /usr-host/share/dotnet
                  rm -rf /usr-host/share/swift
                  rm -rf /usr-host/share/java
                  rm -rf /usr-host/local/lib/android
                  rm -rf /opt-host/ghc
                  rm -rf /opt-host/hostedtoolcache
                  rm -rf /opt-host/az
                  df -h

            - name: Checkout sources
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Dependencies
              run: |
                  dnf -y builddep nobara/kernel.spec
                  dnf -y install jq

            - name: build
              run: |
                  TOPDIR="$(pwd)/rpmbuild"

                  mkdir -p "$TOPDIR"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
                  cp nobara/* $TOPDIR/SOURCES

                  rpmbuild --define "_topdir $TOPDIR" -ba ./nobara/kernel.spec

            - name: Get OGC version
              if: startsWith(github.ref, 'refs/tags/')
              id: version
              run: |
                  TAG="${{ github.ref_name }}"
                  echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

            - name: Setup ORAS
              if: startsWith(github.ref, 'refs/tags/')
              uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

            - name: Setup Cosign
              if: startsWith(github.ref, 'refs/tags/')
              uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

            - name: Login to ghcr.io
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Push OCI artifact
              if: startsWith(github.ref, 'refs/tags/')
              id: push
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  TOPDIR="$(pwd)/rpmbuild"
                  mkdir -p /tmp/rpms
                  cp "$TOPDIR"/RPMS/x86_64/*.rpm /tmp/rpms/ 2>/dev/null || true
                  cp "$TOPDIR"/RPMS/noarch/*.rpm /tmp/rpms/ 2>/dev/null || true
                  cd /tmp/rpms
                  DIGEST=$(oras push --format json "${REPO}:${VERSION}" ./*.rpm | jq -r '.digest')
                  if [ -z "$DIGEST" ]; then
                      echo "::error::Failed to capture digest from oras push"
                      exit 1
                  fi
                  oras tag "${REPO}:${VERSION}" latest
                  echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              if: startsWith(github.ref, 'refs/tags/')
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
              with:
                  subject-name: ${{ env.OCI_REPO }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true

            - name: Sign artifacts
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign sign --yes "${REPO}:${VERSION}"
                  cosign sign --yes "${REPO}:latest"

            - name: Verify signature
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  REPO="${{ env.OCI_REPO }}"
                  cosign verify \
                    --certificate-identity-regexp=".*" \
                    --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
                    "${REPO}:${VERSION}"
